<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects — Luke Hornof</title>
    <meta name="description" content="A growing wall of builds — each one documenting how it was made, which agents and models built it, and what it cost.">
    <link rel="icon" href="work/img/LH-icon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <!-- F7: resolve theme before first paint (no flash of the wrong palette). -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          var theme =
            stored === "light" || stored === "dark"
              ? stored
              : window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
          document.documentElement.setAttribute("data-theme", theme);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
</head>
<body>
    <!-- F7: dark/light theme toggle. JS sets its label + aria-pressed on load. -->
    <button type="button" class="theme-toggle" aria-pressed="false" aria-label="Switch color theme">
        <span class="theme-toggle-icon" aria-hidden="true"></span>
    </button>

    <!-- F11: Projects wall. Entries are data in content/projects/projects.json,
         inlined below and rendered to cards by renderProjects() in main.js — no
         fetch, so it's a pure static file with zero runtime request. -->
    <script type="application/json" id="projects-data">
[
  {
    "slug": "hornof-org",
    "title": "hornof.org",
    "blurb": "This site — a static personal site rebuilt by an agentic engineering loop, one tested pull request at a time.",
    "date": "2026-07",
    "links": [
      { "label": "How it was built", "href": "built-with.html" },
      { "label": "SoundCloud", "href": "https://soundcloud.com/luke-hornof" }
    ],
    "build": {
      "stack": "Plain HTML · one style.css · vanilla JS · Cloudflare Pages",
      "agents": "Claude Code",
      "models": "Opus 4.8",
      "tests": 64,
      "firstPassGreen": "mostly — review caught the rest",
      "costNote": "Built across the F-series loop iterations; usage tracked in the loop metrics."
    }
  }
]
    </script>

    <main class="projects">
        <p class="colophon-back"><a href="/">&larr; Luke Hornof</a></p>

        <h1>Projects</h1>
        <p class="projects-intro">A growing wall of builds. Each one records how it was made — the stack, the agents and models, the tests, the cost — because how a thing gets built is half the story.</p>

        <div class="projects-list" id="projects-list"></div>
    </main>

    <script src="main.js"></script>
</body>
</html>
