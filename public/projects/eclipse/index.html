<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- The sky is always black: pin the page to a dark colour scheme so macOS
       light mode doesn't render the canvas/controls with light-mode assumptions
       (which dimmed the orbit rings). -->
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="#05070f" />
  <title>eclipse-sim — a solar system computed from first principles</title>
  <style>
    :root { color-scheme: dark; --bg:#05070f; --panel:#0e1424; --ink:#e6ecff; --muted:#8fa0c8; --line:#233; --accent:#5b8bff; }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: var(--bg); color: var(--ink);
      font: 15px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    body { display: flex; flex-direction: column; }
    header { padding: 8px 14px; border-bottom: 1px solid #172038; }
    header h1 { margin: 0; font-size: 15px; font-weight: 600; }
    header p { margin: 2px 0 0; color: var(--muted); font-size: 12px; }
    #view { flex: 1 1 auto; position: relative; min-height: 0; overflow: hidden; }
    #view canvas { display: block; position: absolute; inset: 0; }
    #controls { display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
      padding: 8px 12px; background: var(--panel); border-top: 1px solid #172038; }
    .btn { background: #1a2542; color: var(--ink); border: 1px solid #2b3a63;
      border-radius: 6px; padding: 6px 10px; font-size: 13px; cursor: pointer; min-height: 34px; }
    .btn:hover { background: #22315a; }
    .btn.active { background: var(--accent); border-color: var(--accent); color: #04102b; }
    .btn:focus-visible, input:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
    .readout { color: var(--muted); font-variant-numeric: tabular-nums; font-size: 13px;
      min-width: 90px; text-align: center; }
    input[type=range] { flex: 1 1 160px; min-width: 120px; accent-color: var(--accent); }
    input[type=date] { background: #1a2542; color: var(--ink); border: 1px solid #2b3a63;
      border-radius: 6px; padding: 5px 8px; min-height: 34px; }
    .overlay { position: fixed; inset: 0; background: rgba(3,6,14,0.82);
      display: flex; align-items: center; justify-content: center; z-index: 20; padding: 16px; }
    .overlay.hidden { display: none; }
    .help-card { background: var(--panel); border: 1px solid #2b3a63; border-radius: 12px;
      padding: 20px 22px; max-width: 460px; width: 100%; max-height: 90vh; overflow: auto; }
    .help-card h2 { margin: 0 0 10px; font-size: 18px; }
    .help-card dl { display: grid; grid-template-columns: max-content 1fr; gap: 6px 14px; margin: 0 0 16px; }
    .help-card dt { color: var(--accent); font-weight: 600; white-space: nowrap; }
    .help-card dd { margin: 0; color: var(--ink); }
    .note { color: var(--muted); font-size: 11px; margin-left: auto; }
    /* Eclipse list panel */
    .panel { position: fixed; top: 54px; right: 0; width: 360px; max-width: 92vw;
      bottom: 58px; background: var(--panel); border-left: 1px solid #2b3a63;
      box-shadow: -8px 0 24px rgba(0,0,0,0.4); display: flex; flex-direction: column;
      z-index: 15; }
    .panel.hidden { display: none; }
    .panel-head { display: flex; align-items: center; justify-content: space-between;
      padding: 12px 14px 6px; }
    .panel-head h2 { margin: 0; font-size: 15px; }
    .panel-sub { margin: 0 14px 8px; color: var(--muted); font-size: 12px; }
    .table-wrap { flex: 1 1 auto; overflow: auto; padding: 0 8px; }
    #eclipseTable { width: 100%; border-collapse: collapse; font-size: 13px; }
    #eclipseTable th { text-align: left; position: sticky; top: 0; background: var(--panel);
      color: var(--muted); font-weight: 600; padding: 6px 6px; border-bottom: 1px solid #2b3a63; }
    #eclipseTable td { padding: 6px 6px; border-bottom: 1px solid #172038; }
    .ecl-row { cursor: pointer; }
    .ecl-row:hover, .ecl-row:focus-visible { background: #1a2542; outline: none; }
    .type-total { color: #ffd479; } .type-annular { color: #79c0ff; } .type-hybrid { color: #c39bff; }
    .type-partial { color: #9fb3d1; } .type-penumbral { color: #6f7f9c; }
    #eclipseTable td.geo { color: #9fb3d1; font-variant-numeric: tabular-nums; white-space: nowrap; }
    #eclipseTable .ok, #lunarTable .ok { color: #7ee0a0; }
    #eclipseTable .miss, #lunarTable .miss { color: #ff8f8f; }
    #lunarTable { width: 100%; border-collapse: collapse; font-size: 13px; }
    #lunarTable th { text-align: left; position: sticky; top: 0; background: var(--panel);
      color: var(--muted); font-weight: 600; padding: 6px 6px; border-bottom: 1px solid #2b3a63; }
    #lunarTable td { padding: 6px 6px; border-bottom: 1px solid #172038; }
    .panel-h2b { margin: 6px 14px 2px; font-size: 15px; border-top: 1px solid #2b3a63; padding-top: 10px; }
    .panel-foot { margin: 8px 14px; color: var(--muted); font-size: 11px; }
    @media (max-width: 520px) { .panel { top: 0; bottom: 0; width: 100vw; max-width: 100vw; } }
    /* Next-eclipse card */
    .next-card { position: fixed; top: 66px; left: 12px; z-index: 12;
      background: rgba(14,20,36,0.86); border: 1px solid #2b3a63; border-radius: 10px;
      padding: 10px 12px; max-width: 260px; backdrop-filter: blur(4px); }
    .nc-label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; }
    .nc-date { font-size: 18px; font-weight: 600; margin: 2px 0; }
    .nc-meta { color: var(--muted); font-size: 12px; margin-bottom: 6px; }
    .nc-link { color: var(--accent); font-size: 12px; text-decoration: none; }
    .nc-link:hover { text-decoration: underline; }
    /* On mobile the control bar wraps to several rows, so keep the card at the
       top over the canvas — never over the (taller) bottom controls. */
    @media (max-width: 520px) { .next-card { top: 58px; left: 8px; max-width: 240px; padding: 8px 10px; } }
    /* Sun-Earth-Moon inset (F7) */
    .syzygy { position: fixed; left: 12px; bottom: 66px; z-index: 12;
      background: rgba(14,20,36,0.86); border: 1px solid #2b3a63; border-radius: 10px;
      padding: 8px 10px 6px; backdrop-filter: blur(4px); }
    .syzygy canvas { display: block; }
    .sz-title { color: var(--muted); font-size: 11px; text-transform: uppercase;
      letter-spacing: 0.04em; margin-bottom: 4px; }
    .sz-readout { color: var(--ink); font-size: 11px; margin-top: 4px; font-variant-numeric: tabular-nums; }
    /* On mobile the wrapped control bar owns the bottom; hide the inset there. */
    @media (max-width: 520px) { .syzygy { display: none; } }
    @media (max-width: 520px) {
      .readout { min-width: 70px; font-size: 12px; }
      header p { display: none; }
    }
  </style>
</head>
<body>
  <header>
    <h1>eclipse-sim</h1>
    <p>Sun + 8 planets + Moon, integrated from Newtonian gravity and J2000 initial
       conditions. Body sizes are not to scale; distances use the scale toggle below.</p>
  </header>

  <main id="view" aria-label="Orrery"></main>

  <nav id="controls" aria-label="Time and view controls"></nav>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
