<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Luke Hornof — in motion</title>
<style>
  :root{
    --ink:#5a3825; --ink-soft:rgba(90,56,37,.62);
    --cream:#f2ebe0; --tan:#cbb391; --pale:#efe6d6;
    --serif:Garamond, Baskerville, "Hoefler Text", "Times New Roman", Times, serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:var(--cream)}
  body{font-family:var(--serif);color:var(--ink)}
  #depth{height:700vh}
  #stage{position:fixed;inset:0;overflow:hidden}

  .layer{position:absolute;inset:0;will-change:transform,opacity,filter}
  #far img,#near img{position:absolute;left:50%;top:50%;width:170vmax;max-width:none;
    transform:translate(-50%,-50%)}
  #far{opacity:.45;filter:blur(18px) saturate(.9)}
  #veil-top{position:absolute;inset:0;background:linear-gradient(180deg,
    rgba(242,235,224,.85) 0%,rgba(242,235,224,0) 30%,rgba(242,235,224,0) 72%,
    rgba(46,58,58,.35) 100%);pointer-events:none}
  #curtain{position:absolute;inset:-10%;background:
    radial-gradient(120% 90% at 50% 55%, rgba(242,235,224,.98) 0%, rgba(242,235,224,.94) 55%, rgba(242,235,224,.88) 100%);
    opacity:0;pointer-events:none}
  .haze{position:absolute;width:140%;height:46%;left:-20%;border-radius:50%;
    background:radial-gradient(closest-side,rgba(242,235,224,.55),rgba(242,235,224,0));
    filter:blur(6px);pointer-events:none;will-change:transform,opacity}
  #haze1{top:56%} #haze2{top:12%;opacity:.6}

  .chapter{position:absolute;inset:0;display:flex;flex-direction:column;
    justify-content:center;pointer-events:none}
  .chapter .inner{max-width:min(60ch,84vw);margin:0 6vw;padding-left:1.2rem}
  .line{overflow:hidden}
  .line .t{display:block;transform:translateY(112%);opacity:0;will-change:transform,opacity}

  /* the opening reveal: pure CSS, fires as soon as the page is visible — no JS frames needed */
  @keyframes rise{to{transform:translateY(0);opacity:1}}
  #ch1 .line:nth-child(1) .t{animation:rise 1.05s cubic-bezier(.16,.6,.35,1) .25s forwards}
  #ch1 .line:nth-child(2) .t{animation:rise 1.05s cubic-bezier(.16,.6,.35,1) .40s forwards}
  #ch1 .line:nth-child(3) .t{animation:rise 1.05s cubic-bezier(.16,.6,.35,1) .55s forwards}
  /* once scrolling begins, JS takes over ch1 lines */
  #ch1.js .line .t{animation:none}

  h1{font-size:clamp(2.4rem,6.2vw,5.2rem);font-weight:500;letter-spacing:.14em;
    text-transform:uppercase;line-height:1.08}
  .kicker{font-size:clamp(.8rem,1.2vw,.95rem);letter-spacing:.42em;
    text-transform:uppercase;color:var(--ink-soft);margin-bottom:1.1rem}
  .big{font-size:clamp(1.6rem,3.6vw,3rem);line-height:1.25;font-style:italic}
  .ch-dark{color:var(--pale)}
  .ch-dark .kicker{color:rgba(239,230,214,.72)}
  .ch-dark .big,.ch-dark h1{text-shadow:0 1px 22px rgba(20,28,28,.35)}

  #cue{position:absolute;left:6vw;bottom:5vh;font-size:.8rem;letter-spacing:.34em;
    text-transform:uppercase;color:var(--ink-soft);display:flex;gap:1rem;align-items:center}
  #cue::after{content:"";display:block;width:56px;height:1px;background:var(--ink-soft);
    animation:pulse 2.6s ease-in-out infinite}
  @keyframes pulse{0%,100%{transform:scaleX(.35);opacity:.4}50%{transform:scaleX(1);opacity:1}}

  #foot{position:absolute;right:6vw;bottom:5vh;font-size:.8rem;letter-spacing:.3em;
    text-transform:uppercase;color:rgba(239,230,214,.8);opacity:0;pointer-events:auto}
  #foot a{color:inherit;text-decoration:none;border-bottom:1px solid rgba(239,230,214,.45);
    padding-bottom:2px}
  @media (prefers-reduced-motion: reduce){
    #depth{height:100vh} .line .t{transform:none!important;opacity:1!important;animation:none!important}
  }
</style>
</head>
<body>
<div id="depth"></div>
<div id="stage" aria-label="Animated panorama of Luke Hornof's artwork">
  <div class="layer" id="far"><img src="/work/img/bg-panorama.webp" alt=""></div>
  <div class="layer" id="near"><img src="/work/img/bg-panorama.webp" alt=""></div>
  <div class="haze" id="haze1"></div>
  <div class="haze" id="haze2"></div>
  <div id="veil-top"></div>
  <div id="curtain"></div>

  <section class="chapter" id="ch1">
    <div class="inner">
      <div class="line"><span class="t kicker">hornof.org</span></div>
      <div class="line"><div class="t"><h1>Luke Hornof</h1></div></div>
      <div class="line"><span class="t big">AI engineering leader.</span></div>
    </div>
  </section>

  <section class="chapter ch-dark" id="ch2">
    <div class="inner">
      <div class="line"><span class="t kicker">the practice</span></div>
      <div class="line"><span class="t big">Hands-on founder,<br>agentic engineer.</span></div>
    </div>
  </section>

  <section class="chapter ch-dark" id="ch3">
    <div class="inner">
      <div class="line"><span class="t kicker">the proof</span></div>
      <div class="line"><span class="t big">Projects built end-to-end<br>with a managed agent pipeline.</span></div>
    </div>
  </section>

  <div id="cue">scroll</div>
  <div id="foot"><a href="/projects.html">see the projects →</a></div>
</div>

<script>
(() => {
  const clamp=(v,a,b)=>Math.min(b,Math.max(a,v));
  const win=(p,a,b)=>clamp((p-a)/(b-a),0,1);
  const easeOut=t=>1-Math.pow(1-t,3);

  const near=document.getElementById('near');
  const far=document.getElementById('far');
  const curtain=document.getElementById('curtain');
  const veil=document.getElementById('veil-top');
  const h1z=document.getElementById('haze1');
  const h2z=document.getElementById('haze2');
  const cue=document.getElementById('cue');
  const foot=document.getElementById('foot');

  const chapters=[
    {el:document.getElementById('ch1'), a:-0.01,b:0.0,  c:0.16,d:0.26, css:true},
    {el:document.getElementById('ch2'), a:0.56,b:0.66, c:0.76,d:0.84},
    {el:document.getElementById('ch3'), a:0.86,b:0.96, c:1.01,d:1.02}
  ];
  chapters.forEach(ch=>{ch.lines=[...ch.el.querySelectorAll('.line .t')];});

  function pose(p,t){
    const drift=6*Math.sin(t/6000), drift2=4*Math.sin(t/9000+2);
    const e=easeOut(p);
    const x=(8-16*e), y=(6-16*e), s=1.12+.18*e;
    near.style.transform=`translate3d(${x}vw,${y}vh,0) scale(${s}) translate3d(${drift}px,${drift2}px,0)`;
    far.style.transform =`translate3d(${x*0.45}vw,${y*0.45}vh,0) scale(${s*1.18}) translate3d(${drift2}px,${drift}px,0)`;
    far.style.opacity=String(0.45-0.22*e);

    const c=Math.sin(Math.PI*win(p,0.38,0.62));
    curtain.style.opacity=(c*c).toFixed(3);
    veil.style.opacity=String(1-0.2*e);

    h1z.style.transform=`translate3d(${drift2}px,${(30-160*e)}vh,0)`;
    h2z.style.transform=`translate3d(${drift}px,${(10-120*e)}vh,0)`;

    for(const ch of chapters){
      const outA=1-win(p,ch.c,ch.d);
      ch.el.style.opacity=String(Math.min(1,outA*1.2));
      if(ch.css){
        // ch1: CSS animation owns the entrance; JS takes over only once we leave rest
        if(p<0.015){ ch.el.classList.remove('js'); ch.lines.forEach(ln=>{ln.style.opacity='';ln.style.transform='';}); continue; }
        ch.el.classList.add('js');
      }
      ch.lines.forEach((ln,i)=>{
        const la = ch.css ? 1 : win(p, ch.a+i*0.025, ch.b+i*0.025);
        const k=easeOut(Math.min(la,outA));
        ln.style.opacity=String(k);
        ln.style.transform=`translateY(${(1-k)*112}%)`;
      });
    }

    cue.style.opacity=String(1-win(p,0.02,0.10));
    foot.style.opacity=String(win(p,0.90,0.97));
  }

  let target=0, smooth=0, last=0;
  addEventListener('scroll',()=>{target=scrollY/(document.body.scrollHeight-innerHeight);},{passive:true});
  function frame(t){
    const dt=Math.min(200,t-last)||16; last=t;
    const k=1-Math.exp(-dt/350);
    smooth+=(target-smooth)*k;
    if(Math.abs(target-smooth)<1e-5) smooth=target;
    pose(smooth,t);
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  // dev-only deterministic hook for the navigator's audit (strip before merge)
  window.__pose=(p)=>{smooth=p;target=p;pose(p,performance.now());return p;};
})();
</script>
</body>
</html>
