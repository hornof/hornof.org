<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Not found — Luke Hornof</title>
    <meta name="robots" content="noindex">
    <link rel="icon" href="/work/img/LH-icon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/style.css">
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          var theme =
            stored === "light" || stored === "dark"
              ? stored
              : window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
          document.documentElement.setAttribute("data-theme", theme);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
</head>
<body class="page-fixed">
    <!-- F7: dark/light theme toggle. JS sets its label + aria-pressed on load. -->
    <button type="button" class="theme-toggle" aria-pressed="false" aria-label="Switch color theme">
        <span class="theme-toggle-icon" aria-hidden="true"></span>
    </button>

    <main class="colophon">
        <h1>404 — not found</h1>
        <p>No page lives at this address. It may have moved when the site was rebuilt in 2026.</p>
        <p><a href="/">&larr; Back to the front page</a> · <a href="/projects.html">Projects</a></p>
    </main>

    <script src="/main.js"></script>
</body>
</html>
